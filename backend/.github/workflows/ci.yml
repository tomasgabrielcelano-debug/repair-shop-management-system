name: ci

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Restore
        run: dotnet restore RepairShop.sln
      - name: Build
        run: dotnet build RepairShop.sln -c Release --no-restore
      - name: Test
        run: dotnet test RepairShop.sln -c Release --no-build
